name: AI Defect Prediction — BiLSTM-MHA

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  predict-defects:
    name: Run BiLSTM Defect Prediction
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-bilstm-pip-v1

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch==2.2.0 --index-url https://download.pytorch.org/whl/cpu
          pip install huggingface_hub joblib scikit-learn numpy

      - name: Extract JIT metrics from PR diff
        if: github.event_name == 'pull_request'
        run: |
          python scripts/extract_metrics.py \
            --base ${{ github.event.pull_request.base.sha }} \
            --head ${{ github.event.pull_request.head.sha }} \
            --output metrics.json

      - name: Run BiLSTM defect prediction
        if: github.event_name == 'pull_request'
        run: |
          python scripts/predict.py \
            --metrics metrics.json \
            --output prediction.json
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Post prediction comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const prediction = JSON.parse(
              fs.readFileSync('prediction.json', 'utf8')
            );

            const metrics = JSON.parse(
              fs.readFileSync('metrics.json', 'utf8')
            );

            const prob = prediction.defect_probability;
            const isHigh = prob >= 0.55;
            const dot = isHigh ? '🔴' : '🟢';
            const level = isHigh ? 'HIGH' : 'LOW';
            const pct = (prob * 100).toFixed(1);

            const recommendation = isHigh
              ? 'Thorough code review and additional test coverage strongly recommended before merging.'
              : 'Low risk — safe to proceed with standard review.';

            const body = `## 🤖 AI Defect Prediction — BiLSTM-MHA

            **Risk Level:** ${dot} **${level}** (${pct}% defect probability)

            | Metric | Value |
            |---|---|
            | Lines Added | ${metrics.lines_added} |
            | Lines Deleted | ${metrics.lines_deleted} |
            | Files Changed | ${metrics.files_changed} |
            | Entropy | ${metrics.entropy_label} |
            | Developer Experience | ${metrics.developer_experience} commits |

            **Recommendation:** ${recommendation}

            ---
            *Model: [Preksha172/lstm-jit-defect-prediction](https://huggingface.co/Preksha172/lstm-jit-defect-prediction) | Trained on JIT-Defects4J (16,374 commits) | F1=38.19%*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            for (const c of comments) {
              if (
                c.user.type === 'Bot' &&
                c.body.includes('AI Defect Prediction')
              ) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
